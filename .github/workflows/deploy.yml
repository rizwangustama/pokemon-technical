name: Build, Push and Deploy

on:
  push:
    branches:
      - master

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pokemon-technical:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SIGNATURE_SECRET=${{ secrets.NEXT_PUBLIC_SIGNATURE_SECRET }}
            POKEAPI_URL=${{ secrets.POKEAPI_URL }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/pokemon-technical:latest

            sudo docker rm -f pokemon-technical || true

            sudo docker run -d \
              --name pokemon-technical \
              -p 127.0.0.1:3000:3000 \
              --restart always \
              --env-file /opt/apps/pokemon-technical/.env \
              ${{ secrets.DOCKERHUB_USERNAME }}/pokemon-technical:latest